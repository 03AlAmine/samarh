<!-- ─── FORMULAIRE EMPLOYÉ ────────────────────────────────────────────────── -->
<form [formGroup]="form" (ngSubmit)="submit()" class="emp-form">

  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">Prénom *</label>
      <input class="form-control" formControlName="prenom" placeholder="Prénom"
        [class.invalid]="f['prenom'].invalid && f['prenom'].touched"/>
    </div>
    <div class="form-group">
      <label class="form-label">Nom *</label>
      <input class="form-control" formControlName="nom" placeholder="Nom"
        [class.invalid]="f['nom'].invalid && f['nom'].touched"/>
    </div>
    <div class="form-group">
      <label class="form-label">Matricule *</label>
      <input class="form-control" formControlName="matricule" placeholder="EMP001"
        [class.invalid]="f['matricule'].invalid && f['matricule'].touched"/>
    </div>
    <div class="form-group">
      <label class="form-label">Poste</label>
      <input class="form-control" formControlName="poste" placeholder="Ex: Développeur"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" formControlName="email" placeholder="employe@exemple.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone</label>
      <input class="form-control" type="tel" formControlName="telephone" placeholder="+221 77 000 00 00"/>
    </div>
    <div class="form-group">
      <label class="form-label">Service</label>
      <select class="form-control" formControlName="service">
        <option value="">— Aucun —</option>
        @for (s of services; track s.id) {
          <option [value]="s.matricule">{{ s.nom }}</option>
        }
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Type de contrat</label>
      <select class="form-control" formControlName="typeContrat">
        <option value="CDI">CDI</option>
        <option value="CDD">CDD</option>
        <option value="Stage">Stage</option>
        <option value="Freelance">Freelance</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Date d'embauche</label>
      <input class="form-control" type="date" formControlName="dateEmbauche"/>
    </div>
    <div class="form-group">
      <label class="form-label">Statut</label>
      <select class="form-control" formControlName="statut">
        <option value="actif">Actif</option>
        <option value="inactif">Inactif</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Login (accès app)</label>
      <input class="form-control" formControlName="login" placeholder="login_employe"/>
    </div>
    <div class="form-group">
      <label class="form-label">{{ employe ? 'Nouveau mot de passe' : 'Mot de passe' }}</label>
      <input class="form-control" type="password" formControlName="password" placeholder="••••••"/>
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn--secondary" (click)="cancel()">Annuler</button>
    <button type="submit" class="btn btn--primary" [disabled]="loading || hashing">
      @if (loading) { <span class="spinner sm"></span> }
      @if (hashing) { Sécurisation… } @else { {{ employe ? 'Enregistrer' : 'Ajouter l\'employé' }} }
    </button>
  </div>

</form>
